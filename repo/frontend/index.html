<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Campus Portal</title>
  <link rel="stylesheet" href="/css/campus.css" />
</head>
<body>

<div style="display:flex;">
  <!-- Sidebar -->
  <nav id="sidebar">
    <div id="sidebar-logo">
      <div class="logo-title">Campus Portal</div>
      <div class="logo-sub">Operations &amp; Logistics</div>
    </div>
    <div id="sidebar-nav"></div>
    <div id="sidebar-footer"></div>
  </nav>

  <!-- Main -->
  <div id="main">
    <header id="topbar">
      <span id="page-title">Dashboard</span>
      <div id="topbar-actions">
        <span id="topbar-date" style="font-size:12px;color:#6b7280;"></span>
      </div>
    </header>

    <div id="content-wrap">
      <!-- Stat tiles -->
      <div class="stat-grid" id="stat-grid">
        <div class="stat-tile"><div class="stat-val" id="stat-activities">—</div><div class="stat-label">Active Activities</div></div>
        <div class="stat-tile"><div class="stat-val" id="stat-orders">—</div><div class="stat-label">Open Orders</div></div>
        <div class="stat-tile"><div class="stat-val" id="stat-shipments">—</div><div class="stat-label">Shipments In Transit</div></div>
        <div class="stat-tile"><div class="stat-val" id="stat-violations">—</div><div class="stat-label">Active Violations</div></div>
      </div>

      <!-- Activity status chart -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
        <div class="card">
          <div class="card-title">Activity Status Breakdown</div>
          <div id="activity-status-chart"></div>
        </div>
        <div class="card">
          <div class="card-title">Order Pipeline</div>
          <div id="order-pipeline-chart"></div>
        </div>
      </div>

      <!-- Recent activity feed -->
      <div class="card" style="margin-top:0;">
        <div class="card-title">Recent Activities</div>
        <div id="recent-activities">Loading…</div>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script>
(async function init() {
  if (!requireAuth()) return;

  // Date display
  document.getElementById('topbar-date').textContent = new Date().toLocaleDateString('en-US', {weekday:'short',year:'numeric',month:'short',day:'numeric'});

  // Load widget data in parallel
  const [actStats, orderStats] = await Promise.allSettled([
    API.get('/widgets/data?widget_type=activity_status'),
    API.get('/widgets/data?widget_type=order_pipeline'),
  ]);

  // Activity status tiles
  if (actStats.status === 'fulfilled') {
    const d = actStats.value.data;
    document.getElementById('stat-activities').textContent =
      (d.published || 0) + (d.in_progress || 0);

    let html = '';
    for (const [st, cnt] of Object.entries(d)) {
      html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #f0f1f7;">
        ${badge(st)} <strong>${cnt}</strong></div>`;
    }
    document.getElementById('activity-status-chart').innerHTML = html || '<p style="color:#9ca3af">No data yet.</p>';
  }

  // Order pipeline
  if (orderStats.status === 'fulfilled') {
    const d = orderStats.value.data;
    const open = (d.placed||0)+(d.pending_payment||0)+(d.paid||0)+(d.ticketing||0);
    document.getElementById('stat-orders').textContent = open;

    let html = '';
    for (const [st, cnt] of Object.entries(d)) {
      html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #f0f1f7;">
        ${badge(st)} <strong>${cnt}</strong></div>`;
    }
    document.getElementById('order-pipeline-chart').innerHTML = html || '<p style="color:#9ca3af">No data yet.</p>';
  }

  // Recent activities
  try {
    const res = await API.get('/activities?limit=6&sort=created_at');
    const activities = res.data?.data || [];
    if (activities.length === 0) {
      document.getElementById('recent-activities').innerHTML = '<p style="color:#9ca3af">No activities yet.</p>';
    } else {
      document.getElementById('recent-activities').innerHTML = `
        <table class="data-table">
          <thead><tr><th>Title</th><th>Status</th><th>Created</th></tr></thead>
          <tbody>${activities.map(a => `<tr>
            <td><a href="/pages/activities.html?id=${a.id}" style="color:var(--c-accent);text-decoration:none;">${a.title}</a></td>
            <td>${badge(a.status)}</td>
            <td>${fmt(a.created_at)}</td>
          </tr>`).join('')}</tbody>
        </table>`;
    }
  } catch (err) {
    document.getElementById('recent-activities').innerHTML = '<p style="color:#ef4444">Failed to load activities.</p>';
  }
})();
</script>
</body>
</html>
