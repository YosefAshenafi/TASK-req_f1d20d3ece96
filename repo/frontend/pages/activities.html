<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Activities — Campus Portal</title>
  <link rel="stylesheet" href="/css/campus.css" />
</head>
<body>
<div style="display:flex;">
  <nav id="sidebar">
    <div id="sidebar-logo">
      <div class="logo-title">Campus Portal</div>
      <div class="logo-sub">Operations &amp; Logistics</div>
    </div>
    <div id="sidebar-nav"></div>
    <div id="sidebar-footer"></div>
  </nav>

  <div id="main">
    <header id="topbar">
      <span id="page-title">Activities</span>
      <div id="topbar-actions">
        <button class="btn btn-primary" id="btn-new-activity" style="display:none;" onclick="openCreateModal()">
          + New Activity
        </button>
      </div>
    </header>

    <div id="content-wrap">
      <!-- Search & Filters -->
      <div class="card" style="padding:16px 20px;margin-bottom:16px;">
        <div class="search-bar">
          <input type="text" id="search-input" class="form-control" placeholder="Search activities…" />
          <select id="filter-status" class="form-control" style="width:160px;">
            <option value="">All Statuses</option>
            <option value="draft">Draft</option>
            <option value="published">Published</option>
            <option value="in_progress">In Progress</option>
            <option value="completed">Completed</option>
            <option value="archived">Archived</option>
          </select>
          <select id="filter-sort" class="form-control" style="width:140px;">
            <option value="created_at">Newest</option>
            <option value="popularity">Popular</option>
          </select>
          <button class="btn btn-secondary" onclick="loadActivities(1)">Search</button>
        </div>
        <!-- Recommendations strip -->
        <div id="recommendations-strip" style="display:none;margin-top:10px;">
          <div style="font-size:12px;color:var(--c-text-muted);margin-bottom:6px;">Recommended for you</div>
          <div id="rec-list" style="display:flex;gap:10px;flex-wrap:wrap;"></div>
        </div>
      </div>

      <!-- Activity list -->
      <div class="card">
        <div id="activities-table">Loading…</div>
        <div id="pagination"></div>
      </div>
    </div>
  </div>
</div>

<!-- Create Activity Modal -->
<div class="modal-overlay" id="create-modal">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title">New Activity</span>
      <button class="modal-close" onclick="closeModal('create-modal')">&#10005;</button>
    </div>
    <form id="create-form" novalidate>
      <div class="form-group">
        <label class="form-label">Title *</label>
        <input type="text" id="f-title" class="form-control" required />
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea id="f-description" class="form-control" rows="3"></textarea>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-group">
          <label class="form-label">Signup Start</label>
          <input type="datetime-local" id="f-signup-start" class="form-control" />
        </div>
        <div class="form-group">
          <label class="form-label">Signup End</label>
          <input type="datetime-local" id="f-signup-end" class="form-control" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Max Headcount</label>
        <input type="number" id="f-max-headcount" class="form-control" min="1" />
      </div>
      <div class="form-group">
        <label class="form-label">Required Supplies</label>
        <input type="text" id="f-required-supplies" class="form-control" placeholder="Comma-separated list" />
      </div>
      <div class="form-error" id="create-err"></div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px;">
        <button type="button" class="btn btn-secondary" onclick="closeModal('create-modal')">Cancel</button>
        <button type="submit" class="btn btn-primary">Create Activity</button>
      </div>
    </form>
  </div>
</div>

<!-- Changelog / Version Diff Modal -->
<div class="modal-overlay" id="changelog-modal">
  <div class="modal-box" style="max-width:640px;">
    <div class="modal-header">
      <span class="modal-title">Change Log</span>
      <button class="modal-close" onclick="closeModal('changelog-modal')">&#10005;</button>
    </div>
    <div id="changelog-content"></div>
  </div>
</div>

<div id="toast-container"></div>
<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script>
let currentPage = 1;

async function loadActivities(page = 1) {
  currentPage = page;
  const q      = document.getElementById('search-input').value.trim();
  const status = document.getElementById('filter-status').value;
  const sort   = document.getElementById('filter-sort').value;

  const params = new URLSearchParams({ page, limit: 12, sort });
  if (q) params.set('q', q);
  if (status) params.set('status', status);

  try {
    const res = await API.get('/activities?' + params.toString());
    renderTable(res.data.data || []);
    const meta = res.data;
    renderPagination('pagination', page, Math.ceil((meta.total || 0) / 12),
      'loadActivities');
  } catch {
    document.getElementById('activities-table').innerHTML = '<p style="color:var(--c-danger)">Failed to load activities.</p>';
  }
}

function renderTable(rows) {
  if (!rows.length) {
    document.getElementById('activities-table').innerHTML = '<p style="color:var(--c-text-muted);padding:12px 0;">No activities found.</p>';
    return;
  }
  const canEdit = hasRole('admin', 'ops_staff');
  document.getElementById('activities-table').innerHTML = `
    <table class="data-table">
      <thead><tr>
        <th>Title</th><th>Status</th><th>Signups</th>
        <th>Signup Window</th><th>Created</th><th>Actions</th>
      </tr></thead>
      <tbody>${rows.map(a => `<tr>
        <td style="font-weight:500">${a.title}</td>
        <td>${badge(a.status)}</td>
        <td>${a.signup_count || 0}${a.max_headcount ? ' / ' + a.max_headcount : ''}</td>
        <td style="font-size:12px">${a.signup_start ? fmt(a.signup_start) + '<br>' + fmt(a.signup_end) : '—'}</td>
        <td style="font-size:12px">${fmt(a.created_at)}</td>
        <td style="white-space:nowrap;">
          ${a.status === 'published' ? `<button class="btn btn-secondary btn-sm" onclick="signup(${a.id})">Sign Up</button> ` : ''}
          ${canEdit ? `<button class="btn btn-secondary btn-sm" onclick="showChangelog(${a.id})">Log</button>` : ''}
          ${canEdit && a.status === 'draft' ? `<button class="btn btn-primary btn-sm" onclick="transition(${a.id},'published')">Publish</button>` : ''}
        </td>
      </tr>`).join('')}</tbody>
    </table>`;
}

async function signup(activityId) {
  try {
    await API.post(`/activities/${activityId}/signups`, {});
    toast('Signed up successfully!', 'success');
    loadActivities(currentPage);
  } catch (err) {
    toast(err.data?.msg || 'Signup failed.', 'error');
  }
}

async function transition(activityId, newStatus) {
  try {
    await API.patch(`/activities/${activityId}/state`, { status: newStatus });
    toast(`Activity moved to ${newStatus}.`, 'success');
    loadActivities(currentPage);
  } catch (err) {
    toast(err.data?.msg || 'Transition failed.', 'error');
  }
}

async function showChangelog(activityId) {
  document.getElementById('changelog-content').innerHTML = 'Loading…';
  document.getElementById('changelog-modal').classList.add('open');
  try {
    const res = await API.get(`/activities/${activityId}/versions`);
    const versions = res.data || [];
    if (!versions.length) {
      document.getElementById('changelog-content').innerHTML = '<p style="color:var(--c-text-muted)">No versions recorded.</p>';
      return;
    }
    document.getElementById('changelog-content').innerHTML = versions.map(v => `
      <div style="border-bottom:1px solid var(--c-border);padding:12px 0;">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
          <strong>Version ${v.version_number}</strong>
          <span style="font-size:12px;color:var(--c-text-muted)">${fmt(v.created_at)}</span>
        </div>
        <div style="font-size:13px;">${formatDiff(v.diff_json)}</div>
      </div>`).join('');
  } catch {
    document.getElementById('changelog-content').innerHTML = '<p style="color:var(--c-danger)">Failed to load versions.</p>';
  }
}

function formatDiff(diffJson) {
  if (!diffJson) return '<em>No changes recorded.</em>';
  let diff;
  try { diff = typeof diffJson === 'string' ? JSON.parse(diffJson) : diffJson; } catch { return diffJson; }
  return Object.entries(diff).map(([field, change]) =>
    `<div><strong>${field}</strong>: <del style="color:#ef4444">${change.from ?? '—'}</del> → <mark>${change.to ?? '—'}</mark></div>`
  ).join('');
}

function openCreateModal() {
  document.getElementById('create-modal').classList.add('open');
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

document.getElementById('create-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  document.getElementById('create-err').textContent = '';
  const body = {
    title:            document.getElementById('f-title').value.trim(),
    description:      document.getElementById('f-description').value.trim(),
    signup_start:     document.getElementById('f-signup-start').value || null,
    signup_end:       document.getElementById('f-signup-end').value || null,
    max_headcount:    parseInt(document.getElementById('f-max-headcount').value) || null,
    required_supplies:document.getElementById('f-required-supplies').value.trim(),
  };
  try {
    await API.post('/activities', body);
    toast('Activity created.', 'success');
    closeModal('create-modal');
    loadActivities(1);
  } catch (err) {
    document.getElementById('create-err').textContent = err.data?.msg || 'Creation failed.';
  }
});

document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') loadActivities(1);
});

// Show create button for staff/admin
if (hasRole('admin', 'ops_staff')) {
  document.getElementById('btn-new-activity').style.display = '';
}

// Load recommendations
(async function loadRecs() {
  try {
    const res = await API.get('/recommendations');
    const recs = res.data || [];
    if (recs.length) {
      document.getElementById('recommendations-strip').style.display = '';
      document.getElementById('rec-list').innerHTML = recs.slice(0, 5).map(r =>
        `<a href="/pages/activities.html?id=${r.id}" style="
          background:var(--c-white);border:1px solid var(--c-border);border-radius:var(--r-md);
          padding:8px 14px;font-size:13px;color:var(--c-accent);text-decoration:none;
          white-space:nowrap;">${r.title}</a>`).join('');
    }
  } catch { /* recommendations optional */ }
})();

loadActivities(1);
</script>
</body>
</html>
