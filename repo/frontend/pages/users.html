<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Users — Campus Portal</title>
  <link rel="stylesheet" href="/vendor/layui/css/layui.min.css" />
  <link rel="stylesheet" href="/css/campus.css" />
</head>
<body class="layui-layout-body">

<div class="layui-layout layui-layout-admin">

  <div class="layui-header">
    <div class="layui-logo cp-logo">
      <span class="cp-logo-title">Campus Portal</span>
      <span class="cp-logo-sub">Operations &amp; Logistics</span>
    </div>
    <ul class="layui-nav layui-layout-right" id="header-right-nav"></ul>
  </div>

  <div class="layui-side layui-bg-black">
    <div class="layui-side-scroll">
      <ul class="layui-nav layui-nav-tree" lay-filter="side-nav" id="sidebar-nav"></ul>
    </div>
  </div>

  <div class="layui-body">
    <div class="cp-body-inner">
      <div class="cp-page-bar">
        <span class="cp-page-title" id="page-title">Users</span>
        <div class="cp-page-actions">
          <button class="layui-btn" onclick="openCreateUser()">+ New User</button>
        </div>
      </div>

      <div class="card">
        <div id="users-table">Loading…</div>
        <div id="pagination"></div>
      </div>
    </div>
  </div>

</div>

<!-- Create User Modal body (hidden) -->
<div id="create-user-modal-body" style="display:none;padding:20px;">
  <form class="layui-form" id="create-user-form" novalidate>
    <div class="layui-form-item">
      <label class="layui-label">Username *</label>
      <div class="layui-input-block">
        <input type="text" id="u-username" class="layui-input" required />
      </div>
    </div>
    <div class="layui-form-item">
      <label class="layui-label">Password * <span style="font-size:11px;font-weight:400;">(min 10 chars)</span></label>
      <div class="layui-input-block">
        <input type="password" id="u-password" class="layui-input" minlength="10" required />
      </div>
    </div>
    <div class="layui-form-item">
      <label class="layui-label">Role</label>
      <div class="layui-input-block">
        <select id="u-role" class="layui-select">
          <option value="regular">Regular User</option>
          <option value="ops_staff">Operations Staff</option>
          <option value="team_lead">Team Lead</option>
          <option value="reviewer">Reviewer</option>
          <option value="admin">Administrator</option>
        </select>
      </div>
    </div>
    <div class="form-error" id="create-u-err"></div>
    <div class="layui-form-item" style="text-align:right;margin-bottom:0;">
      <button type="button" class="layui-btn layui-btn-primary" onclick="closeCreateUser()">Cancel</button>
      <button type="submit" class="layui-btn">Create</button>
    </div>
  </form>
</div>

<script src="/vendor/layui/layui.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script>
var _layer, _form, _element;
var _createUserModalIdx;
var currentPage = 1;

layui.use(['element', 'layer', 'form', 'laypage'], function() {
  _layer   = layui.layer;
  _form    = layui.form;
  _element = layui.element;

  renderNav();
  _element.render('nav', 'side-nav');
  loadUsers(1);
});

async function loadUsers(page) {
  currentPage = page || 1;
  try {
    const res   = await API.get(`/users?page=${currentPage}&limit=20`);
    const users = res.data?.data || [];
    if (!users.length) {
      document.getElementById('users-table').innerHTML =
        '<p style="color:var(--c-text-muted);padding:12px 0;">No users found.</p>';
      return;
    }
    document.getElementById('users-table').innerHTML = `
      <table class="layui-table">
        <thead><tr>
          <th>ID</th><th>Username</th><th>Role</th><th>Created</th><th>Actions</th>
        </tr></thead>
        <tbody>${users.map(u => `<tr>
          <td>${u.id}</td>
          <td><strong>${u.username}</strong></td>
          <td>${ROLE_LABELS[u.role] || u.role}</td>
          <td style="font-size:12px">${fmt(u.created_at)}</td>
          <td>
            <button class="layui-btn layui-btn-sm layui-btn-danger"
              onclick="deleteUser(${u.id},'${u.username.replace(/'/g,"\\'")}')"
            >Delete</button>
          </td>
        </tr>`).join('')}</tbody>
      </table>`;
    renderPagination('pagination', currentPage, Math.ceil((res.data.total || 0) / 20), 'loadUsers');
  } catch {
    document.getElementById('users-table').innerHTML =
      '<p style="color:var(--c-danger)">Failed to load users.</p>';
  }
}

async function deleteUser(id, username) {
  if (!confirm(`Delete user "${username}"? This cannot be undone.`)) return;
  try {
    await API.delete(`/users/${id}`);
    toast('User deleted.', 'success');
    loadUsers(currentPage);
  } catch (err) {
    toast(err.data?.msg || 'Delete failed.', 'error');
  }
}

function openCreateUser() {
  document.getElementById('create-u-err').textContent = '';
  _createUserModalIdx = _layer.open({
    type: 1,
    title: 'New User',
    area: ['460px'],
    content: document.getElementById('create-user-modal-body'),
    success: function() { _form.render(); }
  });
}

function closeCreateUser() { _layer.close(_createUserModalIdx); }

document.getElementById('create-user-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  document.getElementById('create-u-err').textContent = '';
  try {
    await API.post('/users', {
      username: document.getElementById('u-username').value.trim(),
      password: document.getElementById('u-password').value,
      role:     document.getElementById('u-role').value,
    });
    toast('User created.', 'success');
    closeCreateUser();
    loadUsers(1);
  } catch (err) {
    document.getElementById('create-u-err').textContent = err.data?.msg || 'Creation failed.';
  }
});
</script>
</body>
</html>
