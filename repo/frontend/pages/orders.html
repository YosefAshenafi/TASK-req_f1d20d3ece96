<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orders — Campus Portal</title>
  <link rel="stylesheet" href="/vendor/layui/css/layui.min.css" />
  <link rel="stylesheet" href="/css/campus.css" />
</head>
<body class="layui-layout-body">

<div class="layui-layout layui-layout-admin">

  <div class="layui-header">
    <div class="layui-logo cp-logo">
      <span class="cp-logo-title">Campus Portal</span>
      <span class="cp-logo-sub">Operations &amp; Logistics</span>
    </div>
    <ul class="layui-nav layui-layout-right" id="header-right-nav"></ul>
  </div>

  <div class="layui-side layui-bg-black">
    <div class="layui-side-scroll">
      <ul class="layui-nav layui-nav-tree" lay-filter="side-nav" id="sidebar-nav"></ul>
    </div>
  </div>

  <div class="layui-body">
    <div class="cp-body-inner">
      <div class="cp-page-bar">
        <span class="cp-page-title" id="page-title">Orders</span>
        <div class="cp-page-actions">
          <button class="layui-btn" onclick="openCreateOrder()">+ New Order</button>
        </div>
      </div>

      <div class="card">
        <div id="orders-table">Loading…</div>
        <div id="pagination"></div>
      </div>
    </div>
  </div>

</div>

<!-- Create Order Modal body (hidden) -->
<div id="create-order-modal-body" style="display:none;padding:20px;">
  <form class="layui-form" id="create-order-form" novalidate>
    <div class="layui-form-item">
      <label class="layui-label">Activity ID *</label>
      <div class="layui-input-block">
        <input type="number" id="o-activity-id" class="layui-input" required />
      </div>
    </div>
    <div class="layui-form-item">
      <label class="layui-label">Order Type *</label>
      <div class="layui-input-block">
        <select id="o-type" class="layui-select" required>
          <option value="equipment_rental">Equipment Rental</option>
          <option value="supply_request">Supply Request</option>
          <option value="service_request">Service Request</option>
          <option value="venue_booking">Venue Booking</option>
        </select>
      </div>
    </div>
    <div class="layui-form-item">
      <label class="layui-label">Description</label>
      <div class="layui-input-block">
        <textarea id="o-description" class="layui-textarea" rows="3"></textarea>
      </div>
    </div>
    <div class="form-error" id="create-order-err"></div>
    <div class="layui-form-item" style="text-align:right;margin-bottom:0;">
      <button type="button" class="layui-btn layui-btn-primary" onclick="closeCreateOrder()">Cancel</button>
      <button type="submit" class="layui-btn">Place Order</button>
    </div>
  </form>
</div>

<script src="/vendor/layui/layui.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script>
var _layer, _form, _element;
var _createOrderModalIdx;
var currentPage = 1;

layui.use(['element', 'layer', 'form', 'laypage'], function() {
  _layer   = layui.layer;
  _form    = layui.form;
  _element = layui.element;

  renderNav();
  _element.render('nav', 'side-nav');
  loadOrders(1);
});

async function loadOrders(page) {
  currentPage = page || 1;
  try {
    const res = await API.get(`/orders?page=${currentPage}&limit=15`);
    const orders = res.data?.data || [];
    if (!orders.length) {
      document.getElementById('orders-table').innerHTML =
        '<p style="color:var(--c-text-muted);padding:12px 0;">No orders found.</p>';
      return;
    }
    document.getElementById('orders-table').innerHTML = `
      <table class="layui-table">
        <thead><tr>
          <th>ID</th><th>Status</th><th>Activity</th><th>Created</th><th>Actions</th>
        </tr></thead>
        <tbody>${orders.map(o => `<tr>
          <td>#${o.id}</td>
          <td>${badge(o.status)}</td>
          <td>${o.activity_id || '—'}</td>
          <td style="font-size:12px">${fmt(o.created_at)}</td>
          <td>${stateActions(o)}</td>
        </tr>`).join('')}</tbody>
      </table>`;
    const meta = res.data;
    renderPagination('pagination', currentPage, Math.ceil((meta.total || 0) / 15), 'loadOrders');
  } catch {
    document.getElementById('orders-table').innerHTML =
      '<p style="color:var(--c-danger)">Failed to load orders.</p>';
  }
}

function stateActions(o) {
  const btns = [];
  const next = {
    placed: 'pending_payment',
    pending_payment: 'paid',
    paid: 'ticketing',
    ticketing: 'ticketed',
    ticketed: 'closed',
  };
  if (next[o.status]) {
    btns.push(`<button class="layui-btn layui-btn-sm" onclick="advance(${o.id},'${next[o.status]}')">→ ${next[o.status].replace(/_/g,' ')}</button>`);
  }
  if (['placed', 'pending_payment'].includes(o.status)) {
    btns.push(`<button class="layui-btn layui-btn-sm layui-btn-danger" onclick="advance(${o.id},'canceled')">Cancel</button>`);
  }
  return btns.join(' ') || '—';
}

async function advance(id, status) {
  try {
    await API.patch(`/orders/${id}/state`, { status });
    toast(`Order moved to ${status}.`, 'success');
    loadOrders(currentPage);
  } catch (err) {
    toast(err.data?.msg || 'Transition failed.', 'error');
  }
}

function openCreateOrder() {
  _createOrderModalIdx = _layer.open({
    type: 1,
    title: 'New Order',
    area: ['480px'],
    content: document.getElementById('create-order-modal-body'),
    success: function() { _form.render(); }
  });
}

function closeCreateOrder() { _layer.close(_createOrderModalIdx); }

document.getElementById('create-order-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  document.getElementById('create-order-err').textContent = '';
  try {
    await API.post('/orders', {
      activity_id: parseInt(document.getElementById('o-activity-id').value),
      type:        document.getElementById('o-type').value,
      description: document.getElementById('o-description').value.trim(),
    });
    toast('Order placed.', 'success');
    closeCreateOrder();
    loadOrders(1);
  } catch (err) {
    document.getElementById('create-order-err').textContent = err.data?.msg || 'Failed.';
  }
});
</script>
</body>
</html>
