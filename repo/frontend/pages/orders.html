<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orders — Campus Portal</title>
  <link rel="stylesheet" href="/css/campus.css" />
</head>
<body>
<div style="display:flex;">
  <nav id="sidebar">
    <div id="sidebar-logo"><div class="logo-title">Campus Portal</div><div class="logo-sub">Operations &amp; Logistics</div></div>
    <div id="sidebar-nav"></div>
    <div id="sidebar-footer"></div>
  </nav>
  <div id="main">
    <header id="topbar">
      <span id="page-title">Orders</span>
      <div id="topbar-actions">
        <button class="btn btn-primary" onclick="openCreateOrder()">+ New Order</button>
      </div>
    </header>
    <div id="content-wrap">
      <div class="card">
        <div id="orders-table">Loading…</div>
        <div id="pagination"></div>
      </div>
    </div>
  </div>
</div>

<!-- Create Order Modal -->
<div class="modal-overlay" id="create-order-modal">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title">New Order</span>
      <button class="modal-close" onclick="closeModal('create-order-modal')">&#10005;</button>
    </div>
    <form id="create-order-form" novalidate>
      <div class="form-group">
        <label class="form-label">Activity ID *</label>
        <input type="number" id="o-activity-id" class="form-control" required />
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea id="o-description" class="form-control" rows="3"></textarea>
      </div>
      <div class="form-error" id="create-order-err"></div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px;">
        <button type="button" class="btn btn-secondary" onclick="closeModal('create-order-modal')">Cancel</button>
        <button type="submit" class="btn btn-primary">Place Order</button>
      </div>
    </form>
  </div>
</div>

<div id="toast-container"></div>
<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script>
let currentPage = 1;

async function loadOrders(page = 1) {
  currentPage = page;
  try {
    const res = await API.get(`/orders?page=${page}&limit=15`);
    const orders = res.data?.data || [];
    if (!orders.length) {
      document.getElementById('orders-table').innerHTML = '<p style="color:var(--c-text-muted);padding:12px 0;">No orders found.</p>';
      return;
    }
    document.getElementById('orders-table').innerHTML = `
      <table class="data-table">
        <thead><tr><th>ID</th><th>Status</th><th>Activity</th><th>Created</th><th>Actions</th></tr></thead>
        <tbody>${orders.map(o => `<tr>
          <td>#${o.id}</td>
          <td>${badge(o.status)}</td>
          <td>${o.activity_id || '—'}</td>
          <td style="font-size:12px">${fmt(o.created_at)}</td>
          <td>${stateActions(o)}</td>
        </tr>`).join('')}</tbody>
      </table>`;
    const meta = res.data;
    renderPagination('pagination', page, Math.ceil((meta.total||0)/15), 'loadOrders');
  } catch {
    document.getElementById('orders-table').innerHTML = '<p style="color:var(--c-danger)">Failed to load orders.</p>';
  }
}

function stateActions(o) {
  const btns = [];
  const next = { placed:'pending_payment', pending_payment:'paid', paid:'ticketing', ticketing:'ticketed', ticketed:'closed' };
  if (next[o.status]) btns.push(`<button class="btn btn-primary btn-sm" onclick="advance(${o.id},'${next[o.status]}')">→ ${next[o.status].replace(/_/g,' ')}</button>`);
  if (['placed','pending_payment'].includes(o.status)) btns.push(`<button class="btn btn-danger btn-sm" onclick="advance(${o.id},'canceled')">Cancel</button>`);
  return btns.join(' ') || '—';
}

async function advance(id, status) {
  try {
    await API.patch(`/orders/${id}/state`, { status });
    toast(`Order moved to ${status}.`, 'success');
    loadOrders(currentPage);
  } catch (err) {
    toast(err.data?.msg || 'Transition failed.', 'error');
  }
}

function openCreateOrder() { document.getElementById('create-order-modal').classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.getElementById('create-order-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  document.getElementById('create-order-err').textContent = '';
  try {
    await API.post('/orders', {
      activity_id: parseInt(document.getElementById('o-activity-id').value),
      description: document.getElementById('o-description').value.trim(),
    });
    toast('Order placed.', 'success');
    closeModal('create-order-modal');
    loadOrders(1);
  } catch (err) {
    document.getElementById('create-order-err').textContent = err.data?.msg || 'Failed.';
  }
});

loadOrders(1);
</script>
</body>
</html>
