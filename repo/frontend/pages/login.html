<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Campus Portal</title>
  <link rel="stylesheet" href="/css/campus.css" />
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <h1>Campus Portal</h1>
      <p>Unified Operations &amp; Logistics</p>
    </div>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input id="username" name="username" type="text" class="form-control"
               autocomplete="username" autofocus required />
        <div class="form-error" id="err-username"></div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input id="password" name="password" type="password" class="form-control"
               autocomplete="current-password" required />
        <div class="form-error" id="err-password"></div>
      </div>

      <div class="form-error" id="err-global" style="margin-bottom:12px;"></div>

      <button type="submit" class="btn btn-primary" id="submit-btn" style="width:100%;justify-content:center;">
        Sign In
      </button>
    </form>
  </div>
</div>

<div id="toast-container"></div>
<script src="/js/api.js"></script>
<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('submit-btn');

  // Clear errors
  ['err-username','err-password','err-global'].forEach(id => { document.getElementById(id).textContent = ''; });

  if (!username) { document.getElementById('err-username').textContent = 'Username is required.'; return; }
  if (password.length < 10) { document.getElementById('err-password').textContent = 'Password must be at least 10 characters.'; return; }

  btn.disabled = true;
  btn.textContent = 'Signing in…';

  try {
    const data = await API.post('/auth/login', { username, password });
    localStorage.setItem('campus_token', data.data.token);
    localStorage.setItem('campus_session', JSON.stringify({
      user_id: data.data.user_id,
      username: data.data.username,
      role: data.data.role,
    }));
    window.location.href = '/index.html';
  } catch (err) {
    const msg = err.data?.msg || 'Login failed. Please try again.';
    if (err.status === 423) {
      document.getElementById('err-global').textContent = 'Account locked. Try again in 15 minutes.';
    } else {
      document.getElementById('err-global').textContent = msg;
    }
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
});
</script>
</body>
</html>
