<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Campus Portal</title>
  <link rel="stylesheet" href="/vendor/layui/css/layui.min.css" />
  <link rel="stylesheet" href="/css/campus.css" />
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <h1>Campus Portal</h1>
      <p>Unified Operations &amp; Logistics</p>
    </div>

    <form id="login-form" class="layui-form login-form" novalidate>
      <div class="layui-form-item">
        <label class="layui-label" for="username">Username</label>
        <div class="layui-input-block">
          <input type="text" id="username" name="username" class="layui-input"
                 placeholder="Username" autocomplete="username" autofocus required />
        </div>
        <div class="form-error" id="err-username"></div>
      </div>

      <div class="layui-form-item">
        <label class="layui-label" for="password">Password</label>
        <div class="layui-input-block">
          <input type="password" id="password" name="password" class="layui-input"
                 placeholder="Password" autocomplete="current-password" required />
        </div>
        <div class="form-error" id="err-password"></div>
      </div>

      <div class="form-error" id="err-global" style="margin-bottom:12px;"></div>

      <div class="layui-form-item">
        <button type="submit" class="layui-btn" id="submit-btn" style="width:100%;">Sign In</button>
      </div>
    </form>
  </div>
</div>

<script src="/vendor/layui/layui.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script>
layui.use(['form', 'layer'], function() {
  // form submit is handled via native submit event below
});

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('submit-btn');

  // Clear errors
  ['err-username', 'err-password', 'err-global'].forEach(id => {
    document.getElementById(id).textContent = '';
  });

  if (!username) { document.getElementById('err-username').textContent = 'Username is required.'; return; }
  if (password.length < 10) { document.getElementById('err-password').textContent = 'Password must be at least 10 characters.'; return; }

  btn.disabled = true;
  btn.textContent = 'Signing in…';

  try {
    const data = await API.post('/auth/login', { username, password });
    localStorage.setItem('campus_token', data.data.token);
    localStorage.setItem('campus_session', JSON.stringify({
      user_id:  data.data.user.id,
      username: data.data.user.username,
      role:     data.data.user.role,
    }));
    window.location.href = '/index.html';
  } catch (err) {
    const msg = err.data?.msg || 'Login failed. Please try again.';
    if (err.status === 423) {
      document.getElementById('err-global').textContent = 'Account locked. Try again in 15 minutes.';
    } else {
      document.getElementById('err-global').textContent = msg;
    }
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
});
</script>
</body>
</html>
