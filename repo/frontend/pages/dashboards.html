<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboards — Campus Portal</title>
  <link rel="stylesheet" href="/css/campus.css" />
</head>
<body>
<div style="display:flex;">
  <nav id="sidebar">
    <div id="sidebar-logo"><div class="logo-title">Campus Portal</div><div class="logo-sub">Operations &amp; Logistics</div></div>
    <div id="sidebar-nav"></div>
    <div id="sidebar-footer"></div>
  </nav>
  <div id="main">
    <header id="topbar">
      <span id="page-title">My Dashboards</span>
      <div id="topbar-actions">
        <button class="btn btn-primary" onclick="openCreateDashboard()">+ New Dashboard</button>
      </div>
    </header>
    <div id="content-wrap">
      <div id="dashboard-list">Loading…</div>

      <!-- Widget viewer -->
      <div class="card" id="widget-viewer" style="display:none;">
        <div class="card-title" id="widget-viewer-title"></div>
        <div style="display:flex;gap:10px;margin-bottom:14px;">
          <select id="widget-type-select" class="form-control" style="width:220px;">
            <option value="activity_status">Activity Status</option>
            <option value="order_pipeline">Order Pipeline</option>
            <option value="violation_leaderboard">Violation Leaderboard</option>
            <option value="fulfillment_rate">Fulfillment Rate</option>
          </select>
          <button class="btn btn-secondary" onclick="loadWidget()">Load</button>
          <div style="flex:1"></div>
          <button class="btn btn-secondary btn-sm" onclick="exportDashboard('png')">Export PNG</button>
          <button class="btn btn-secondary btn-sm" onclick="exportDashboard('pdf')">Export PDF</button>
          <button class="btn btn-secondary btn-sm" onclick="exportDashboard('xlsx')">Export XLSX</button>
        </div>
        <div id="widget-data-view"></div>
      </div>
    </div>
  </div>
</div>

<!-- Create Dashboard Modal -->
<div class="modal-overlay" id="create-dashboard-modal">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title">New Dashboard</span>
      <button class="modal-close" onclick="closeModal('create-dashboard-modal')">&#10005;</button>
    </div>
    <form id="create-dashboard-form">
      <div class="form-group">
        <label class="form-label">Name *</label>
        <input type="text" id="d-name" class="form-control" value="My Dashboard" required />
      </div>
      <div class="form-group">
        <label class="form-label">Widgets</label>
        <div id="widget-builder">
          <label style="display:flex;gap:8px;align-items:center;margin-bottom:6px;">
            <input type="checkbox" name="widget" value="activity_status" checked /> Activity Status
          </label>
          <label style="display:flex;gap:8px;align-items:center;margin-bottom:6px;">
            <input type="checkbox" name="widget" value="order_pipeline" checked /> Order Pipeline
          </label>
          <label style="display:flex;gap:8px;align-items:center;margin-bottom:6px;">
            <input type="checkbox" name="widget" value="violation_leaderboard" /> Violation Leaderboard
          </label>
          <label style="display:flex;gap:8px;align-items:center;margin-bottom:6px;">
            <input type="checkbox" name="widget" value="fulfillment_rate" /> Fulfillment Rate
          </label>
        </div>
      </div>
      <div class="form-error" id="create-d-err"></div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px;">
        <button type="button" class="btn btn-secondary" onclick="closeModal('create-dashboard-modal')">Cancel</button>
        <button type="submit" class="btn btn-primary">Create</button>
      </div>
    </form>
  </div>
</div>

<div id="toast-container"></div>
<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script>
let activeDashboardId = null;

async function loadDashboards() {
  try {
    const res = await API.get('/dashboards');
    const layouts = res.data || [];
    if (!layouts.length) {
      document.getElementById('dashboard-list').innerHTML =
        '<div class="card"><p style="color:var(--c-text-muted)">No dashboards yet. Create one above.</p></div>';
      return;
    }
    document.getElementById('dashboard-list').innerHTML = `
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-bottom:20px;">
        ${layouts.map(d => `
          <div class="card" style="cursor:pointer;transition:box-shadow .2s;" onclick="selectDashboard(${d.id},'${d.name.replace(/'/g,"\\'")}')">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;">
              <strong>${d.name}</strong>
              <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteDashboard(${d.id})">&#10005;</button>
            </div>
            <div style="font-size:12px;color:var(--c-text-muted);margin-top:8px;">Updated ${fmt(d.updated_at)}</div>
            <button class="btn btn-secondary btn-sm" style="margin-top:10px;" onclick="event.stopPropagation();toggleFavorite(${d.id})">&#9733; Favorite</button>
          </div>`).join('')}
      </div>`;
  } catch {
    document.getElementById('dashboard-list').innerHTML = '<p style="color:var(--c-danger)">Failed to load dashboards.</p>';
  }
}

function selectDashboard(id, name) {
  activeDashboardId = id;
  document.getElementById('widget-viewer').style.display = '';
  document.getElementById('widget-viewer-title').textContent = name;
  loadWidget();
}

async function loadWidget() {
  const type = document.getElementById('widget-type-select').value;
  document.getElementById('widget-data-view').innerHTML = 'Loading…';
  try {
    const res = await API.get(`/widgets/data?widget_type=${type}`);
    const data = res.data;
    let html = '';
    if (type === 'violation_leaderboard' && Array.isArray(data)) {
      html = `<table class="data-table"><thead><tr><th>#</th><th>User</th><th>Points</th></tr></thead><tbody>
        ${data.map((r,i)=>`<tr><td>${i+1}</td><td>${r.username}</td><td style="font-weight:700">${r.total_points}</td></tr>`).join('')}
      </tbody></table>`;
    } else if (type === 'fulfillment_rate') {
      html = `<div class="stat-grid">
        <div class="stat-tile"><div class="stat-val">${data.total}</div><div class="stat-label">Total Shipments</div></div>
        <div class="stat-tile"><div class="stat-val">${data.delivered}</div><div class="stat-label">Delivered</div></div>
        <div class="stat-tile"><div class="stat-val">${data.rate_pct}%</div><div class="stat-label">Delivery Rate</div></div>
      </div>`;
    } else {
      html = Object.entries(data).map(([k,v])=>
        `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--c-border);">
          ${badge(k)} <strong>${v}</strong></div>`).join('');
    }
    document.getElementById('widget-data-view').innerHTML = html || '<p style="color:var(--c-text-muted)">No data.</p>';
  } catch {
    document.getElementById('widget-data-view').innerHTML = '<p style="color:var(--c-danger)">Failed to load widget.</p>';
  }
}

async function exportDashboard(format) {
  if (!activeDashboardId) { toast('Select a dashboard first.', 'info'); return; }
  try {
    const res = await API.post(`/dashboards/${activeDashboardId}/export`, { format });
    toast(`Export ready: ${res.data.file_path}`, 'success');
  } catch (err) {
    toast(err.data?.msg || 'Export failed.', 'error');
  }
}

async function toggleFavorite(id) {
  try {
    const res = await API.post(`/dashboards/${id}/favorite`);
    toast(res.msg, 'success');
  } catch (err) {
    toast(err.data?.msg || 'Failed.', 'error');
  }
}

async function deleteDashboard(id) {
  if (!confirm('Delete this dashboard?')) return;
  try {
    await API.delete(`/dashboards/${id}`);
    toast('Deleted.', 'success');
    if (activeDashboardId === id) {
      activeDashboardId = null;
      document.getElementById('widget-viewer').style.display = 'none';
    }
    loadDashboards();
  } catch (err) {
    toast(err.data?.msg || 'Failed.', 'error');
  }
}

function openCreateDashboard() { document.getElementById('create-dashboard-modal').classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.getElementById('create-dashboard-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  document.getElementById('create-d-err').textContent = '';
  const checked = [...document.querySelectorAll('input[name="widget"]:checked')].map(el => ({
    widget_type: el.value,
    position: { x: 0, y: 0, w: 6, h: 4 },
  }));
  if (!checked.length) { document.getElementById('create-d-err').textContent = 'Select at least one widget.'; return; }
  try {
    await API.post('/dashboards', {
      name: document.getElementById('d-name').value.trim() || 'My Dashboard',
      layout_json: checked,
    });
    toast('Dashboard created.', 'success');
    closeModal('create-dashboard-modal');
    loadDashboards();
  } catch (err) {
    document.getElementById('create-d-err').textContent = err.data?.msg || 'Failed.';
  }
});

loadDashboards();
</script>
</body>
</html>
