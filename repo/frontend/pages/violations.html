<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Violations — Campus Portal</title>
  <link rel="stylesheet" href="/css/campus.css" />
</head>
<body>
<div style="display:flex;">
  <nav id="sidebar">
    <div id="sidebar-logo"><div class="logo-title">Campus Portal</div><div class="logo-sub">Operations &amp; Logistics</div></div>
    <div id="sidebar-nav"></div>
    <div id="sidebar-footer"></div>
  </nav>
  <div id="main">
    <header id="topbar">
      <span id="page-title">Violations</span>
      <div id="topbar-actions">
        <button class="btn btn-primary" id="btn-log-violation" style="display:none;" onclick="openLogModal()">Log Violation</button>
      </div>
    </header>
    <div id="content-wrap">
      <div class="stat-grid" id="point-summary" style="margin-bottom:20px;"></div>
      <div class="card">
        <div id="violations-table">Loading…</div>
        <div id="pagination"></div>
      </div>
    </div>
  </div>
</div>

<!-- Log Violation Modal -->
<div class="modal-overlay" id="log-modal">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title">Log Violation</span>
      <button class="modal-close" onclick="closeModal('log-modal')">&#10005;</button>
    </div>
    <form id="log-form">
      <div class="form-group">
        <label class="form-label">User ID *</label>
        <input type="number" id="v-user-id" class="form-control" required />
      </div>
      <div class="form-group">
        <label class="form-label">Rule ID *</label>
        <input type="number" id="v-rule-id" class="form-control" required />
      </div>
      <div class="form-group">
        <label class="form-label">Notes</label>
        <textarea id="v-notes" class="form-control" rows="3"></textarea>
      </div>
      <div class="form-error" id="log-err"></div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px;">
        <button type="button" class="btn btn-secondary" onclick="closeModal('log-modal')">Cancel</button>
        <button type="submit" class="btn btn-primary">Log</button>
      </div>
    </form>
  </div>
</div>

<div id="toast-container"></div>
<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script>
let currentPage = 1;

async function loadPointSummary() {
  const s = getSession();
  if (!s) return;
  try {
    const res = await API.get(`/point-summary/users/${s.user_id}`);
    const pts = res.data?.total_points ?? 0;
    document.getElementById('point-summary').innerHTML = `
      <div class="stat-tile">
        <div class="stat-val" style="color:${pts > 0 ? 'var(--c-danger)' : 'var(--c-success)'}">${pts}</div>
        <div class="stat-label">My Demerit Points</div>
      </div>`;
  } catch { /* ignore */ }
}

async function loadViolations(page = 1) {
  currentPage = page;
  try {
    const res = await API.get(`/violations?page=${page}&limit=15`);
    const rows = res.data?.data || [];
    if (!rows.length) {
      document.getElementById('violations-table').innerHTML = '<p style="color:var(--c-text-muted);padding:12px 0;">No violations found.</p>';
      return;
    }
    document.getElementById('violations-table').innerHTML = `
      <table class="data-table">
        <thead><tr><th>ID</th><th>User</th><th>Rule</th><th>Points</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead>
        <tbody>${rows.map(v => `<tr>
          <td>#${v.id}</td>
          <td>${v.user_id}</td>
          <td>${v.rule_id}</td>
          <td style="font-weight:700;color:${v.points > 0 ? 'var(--c-danger)' : 'var(--c-success)'}">${v.points > 0 ? '+' : ''}${v.points}</td>
          <td>${badge(v.status || 'active')}</td>
          <td style="font-size:12px">${fmt(v.created_at)}</td>
          <td>${v.appeal_status === null ? `<button class="btn btn-secondary btn-sm" onclick="submitAppeal(${v.id})">Appeal</button>` : `<em style="font-size:12px">${v.appeal_status}</em>`}</td>
        </tr>`).join('')}</tbody>
      </table>`;
    renderPagination('pagination', page, Math.ceil((res.data.total||0)/15), 'loadViolations');
  } catch {
    document.getElementById('violations-table').innerHTML = '<p style="color:var(--c-danger)">Failed to load violations.</p>';
  }
}

async function submitAppeal(id) {
  const reason = prompt('Appeal reason:');
  if (!reason) return;
  try {
    await API.post(`/violations/${id}/appeals`, { reason });
    toast('Appeal submitted.', 'success');
    loadViolations(currentPage);
  } catch (err) {
    toast(err.data?.msg || 'Appeal failed.', 'error');
  }
}

function openLogModal() { document.getElementById('log-modal').classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.getElementById('log-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  document.getElementById('log-err').textContent = '';
  try {
    await API.post('/violations', {
      user_id: parseInt(document.getElementById('v-user-id').value),
      rule_id: parseInt(document.getElementById('v-rule-id').value),
      notes:   document.getElementById('v-notes').value.trim(),
    });
    toast('Violation logged.', 'success');
    closeModal('log-modal');
    loadViolations(1);
  } catch (err) {
    document.getElementById('log-err').textContent = err.data?.msg || 'Failed.';
  }
});

if (hasRole('admin', 'ops_staff')) {
  document.getElementById('btn-log-violation').style.display = '';
}

loadPointSummary();
loadViolations(1);
</script>
</body>
</html>
