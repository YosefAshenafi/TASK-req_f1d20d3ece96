<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Violations — Campus Portal</title>
  <link rel="stylesheet" href="/vendor/layui/css/layui.min.css" />
  <link rel="stylesheet" href="/css/campus.css" />
</head>
<body class="layui-layout-body">

<div class="layui-layout layui-layout-admin">

  <div class="layui-header">
    <div class="layui-logo cp-logo">
      <span class="cp-logo-title">Campus Portal</span>
      <span class="cp-logo-sub">Operations &amp; Logistics</span>
    </div>
    <ul class="layui-nav layui-layout-right" id="header-right-nav"></ul>
  </div>

  <div class="layui-side layui-bg-black">
    <div class="layui-side-scroll">
      <ul class="layui-nav layui-nav-tree" lay-filter="side-nav" id="sidebar-nav"></ul>
    </div>
  </div>

  <div class="layui-body">
    <div class="cp-body-inner">
      <div class="cp-page-bar">
        <span class="cp-page-title" id="page-title">Violations</span>
        <div class="cp-page-actions">
          <button class="layui-btn" id="btn-log-violation" style="display:none;" onclick="openLogModal()">
            Log Violation
          </button>
        </div>
      </div>

      <!-- Demerit point summary tile -->
      <div class="stat-grid" id="point-summary" style="margin-bottom:20px;"></div>

      <div class="card">
        <div id="violations-table">Loading…</div>
        <div id="pagination"></div>
      </div>
    </div>
  </div>

</div>

<!-- Log Violation Modal body (hidden) -->
<div id="log-modal-body" style="display:none;padding:20px;">
  <form class="layui-form" id="log-form" novalidate>
    <div class="layui-form-item">
      <label class="layui-label">User ID *</label>
      <div class="layui-input-block">
        <input type="number" id="v-user-id" class="layui-input" required />
      </div>
    </div>
    <div class="layui-form-item">
      <label class="layui-label">Rule ID *</label>
      <div class="layui-input-block">
        <input type="number" id="v-rule-id" class="layui-input" required />
      </div>
    </div>
    <div class="layui-form-item">
      <label class="layui-label">Notes</label>
      <div class="layui-input-block">
        <textarea id="v-notes" class="layui-textarea" rows="3"></textarea>
      </div>
    </div>
    <div class="form-error" id="log-err"></div>
    <div class="layui-form-item" style="text-align:right;margin-bottom:0;">
      <button type="button" class="layui-btn layui-btn-primary" onclick="closeLogModal()">Cancel</button>
      <button type="submit" class="layui-btn">Log</button>
    </div>
  </form>
</div>

<script src="/vendor/layui/layui.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script>
var _layer, _form, _element;
var _logModalIdx;
var currentPage = 1;

layui.use(['element', 'layer', 'form', 'laypage'], function() {
  _layer   = layui.layer;
  _form    = layui.form;
  _element = layui.element;

  renderNav();
  _element.render('nav', 'side-nav');

  if (hasRole('admin', 'ops_staff')) {
    document.getElementById('btn-log-violation').style.display = '';
  }

  loadPointSummary();
  loadViolations(1);
});

async function loadPointSummary() {
  const s = getSession();
  if (!s) return;
  try {
    const res = await API.get(`/point-summary/users/${s.user_id}`);
    const pts = res.data?.total_points ?? 0;
    document.getElementById('point-summary').innerHTML = `
      <div class="stat-tile">
        <div class="stat-val" style="color:${pts > 0 ? 'var(--c-danger)' : 'var(--c-success)'}">${pts}</div>
        <div class="stat-label">My Demerit Points</div>
      </div>`;
  } catch { /* ignore */ }
}

async function loadViolations(page) {
  currentPage = page || 1;
  try {
    const res  = await API.get(`/violations?page=${currentPage}&limit=15`);
    const rows = res.data?.data || [];
    if (!rows.length) {
      document.getElementById('violations-table').innerHTML =
        '<p style="color:var(--c-text-muted);padding:12px 0;">No violations found.</p>';
      return;
    }
    document.getElementById('violations-table').innerHTML = `
      <table class="layui-table">
        <thead><tr>
          <th>ID</th><th>User</th><th>Rule</th><th>Points</th><th>Status</th><th>Date</th><th>Actions</th>
        </tr></thead>
        <tbody>${rows.map(v => `<tr>
          <td>#${v.id}</td>
          <td>${v.user_id}</td>
          <td>${v.rule_id}</td>
          <td style="font-weight:700;color:${v.points > 0 ? 'var(--c-danger)' : 'var(--c-success)'}">
            ${v.points > 0 ? '+' : ''}${v.points}
          </td>
          <td>${badge(v.status || 'active')}</td>
          <td style="font-size:12px">${fmt(v.created_at)}</td>
          <td>${v.appeal_status === null
            ? `<button class="layui-btn layui-btn-sm layui-btn-primary" onclick="submitAppeal(${v.id})">Appeal</button>`
            : `<em style="font-size:12px">${v.appeal_status}</em>`
          }</td>
        </tr>`).join('')}</tbody>
      </table>`;
    renderPagination('pagination', currentPage, Math.ceil((res.data.total || 0) / 15), 'loadViolations');
  } catch {
    document.getElementById('violations-table').innerHTML =
      '<p style="color:var(--c-danger)">Failed to load violations.</p>';
  }
}

async function submitAppeal(id) {
  const reason = prompt('Appeal reason:');
  if (!reason) return;
  try {
    await API.post(`/violations/${id}/appeals`, { reason });
    toast('Appeal submitted.', 'success');
    loadViolations(currentPage);
  } catch (err) {
    toast(err.data?.msg || 'Appeal failed.', 'error');
  }
}

function openLogModal() {
  document.getElementById('log-err').textContent = '';
  _logModalIdx = _layer.open({
    type: 1,
    title: 'Log Violation',
    area: ['460px'],
    content: document.getElementById('log-modal-body'),
    success: function() { _form.render(); }
  });
}

function closeLogModal() { _layer.close(_logModalIdx); }

document.getElementById('log-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  document.getElementById('log-err').textContent = '';
  try {
    await API.post('/violations', {
      user_id: parseInt(document.getElementById('v-user-id').value),
      rule_id: parseInt(document.getElementById('v-rule-id').value),
      notes:   document.getElementById('v-notes').value.trim(),
    });
    toast('Violation logged.', 'success');
    closeLogModal();
    loadViolations(1);
  } catch (err) {
    document.getElementById('log-err').textContent = err.data?.msg || 'Failed.';
  }
});
</script>
</body>
</html>
