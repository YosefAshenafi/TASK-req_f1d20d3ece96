<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Service Unavailable — Campus Portal</title>
  <!-- Local Layui stylesheet (served statically by nginx, available even when
       the backend/FPM is down). The page's own styles below take precedence. -->
  <link rel="stylesheet" href="/vendor/layui/css/layui.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f4f6f9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #333;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 56px 48px;
      text-align: center;
      max-width: 480px;
      width: 90%;
    }

    .icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 24px;
      background: #fff3f3;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon svg {
      width: 36px;
      height: 36px;
      stroke: #e05252;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 12px;
    }

    p {
      font-size: 15px;
      color: #666;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .btn {
      display: inline-block;
      padding: 11px 28px;
      background: #1e6fd9;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.2s;
    }

    .btn:hover { background: #1558b0; }

    .code {
      margin-top: 28px;
      font-size: 12px;
      color: #bbb;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
    </div>
    <h1>Service Temporarily Unavailable</h1>
    <p>The Campus Portal backend is starting up or temporarily unreachable. Please wait a moment and try again.</p>
    <a href="/" class="btn">Reload Page</a>
    <div class="code">Error 502 &mdash; Bad Gateway</div>
  </div>
</body>
</html>
