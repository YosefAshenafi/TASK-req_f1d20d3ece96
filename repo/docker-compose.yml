services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: campus
      MYSQL_USER: campus
      MYSQL_PASSWORD: campus
    volumes:
      - db_data:/var/lib/mysql
      - ./db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "campus", "-pcampus", "--ssl-mode=DISABLED"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DB_HOST: db
      DB_NAME: campus
      DB_USER: campus
      DB_PASSWORD: campus
      DB_PORT: 3306
      APP_DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      # Keep the image's composer-installed dependencies: the ./backend bind mount
      # above would otherwise shadow /app/vendor with the (un-committed) host dir.
      # This anonymous volume is initialised from the image, so `vendor/` need not
      # be committed to the repo.
      - /app/vendor
      - ./tests:/app/tests
      - ./phpunit.xml:/app/phpunit.xml
      - ./frontend:/app/frontend
      - ./uploads:/app/public/uploads
    # Healthy once php-fpm is accepting FastCGI connections on :9000, which only
    # happens after the entrypoint has finished seeding the database. nginx waits
    # on this condition so the API is live the moment the stack reports ready.
    healthcheck:
      test: ["CMD-SHELL", "php -r 'exit((int)!@fsockopen(\"127.0.0.1\", 9000));'"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 90s

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "3000:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./frontend:/var/www/frontend
      - ./uploads:/var/www/uploads
    depends_on:
      backend:
        condition: service_healthy
    # Healthy once nginx serves the frontend on port 80 (published as host 3000).
    # Use 127.0.0.1 explicitly: inside this image `localhost` resolves to IPv6 ::1,
    # but nginx (`listen 80;`) binds IPv4 only, so a `localhost` probe would fail.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  playwright:
    image: mcr.microsoft.com/playwright:v1.44.0-jammy
    working_dir: /tests
    volumes:
      - ./tests/e2e:/tests
    environment:
      BASE_URL: http://nginx:80
    depends_on:
      - nginx
    profiles:
      - testing
    command: ["npx", "playwright", "test", "--reporter=line"]

volumes:
  db_data:
