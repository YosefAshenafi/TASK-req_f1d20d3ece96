server {
    listen 80;
    server_name _;

    # Allow uploads up to the PHP limit (50M, set in the backend Dockerfile) so
    # the application-level size check (e.g. the 10 MB evidence limit) is the one
    # that rejects oversized files — otherwise nginx returns 413 before the app runs.
    client_max_body_size 50m;

    error_page 502 503 504 /50x.html;

    # Custom error page (served from frontend root, not proxied)
    location = /50x.html {
        root /var/www/frontend;
        internal;
    }

    # Frontend static files.
    # Force revalidation on every load (`no-cache` still allows cheap 304s via
    # ETag/Last-Modified) so the browser always runs the current HTML/JS — never a
    # stale cached copy of the page logic. This is what makes freshly created rows
    # appear without a manual page refresh.
    location / {
        root /var/www/frontend;
        index index.html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }

    # Uploaded files
    location /uploads/ {
        alias /var/www/uploads/;
    }

    # Backend API — FastCGI to PHP-FPM.
    # API responses are dynamic and must never be served from a browser/proxy
    # cache; otherwise a list endpoint can return a stale snapshot after a create
    # and the new record only shows up after a manual refresh.
    location ~ ^/api {
        fastcgi_pass backend:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /app/public/index.php;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param PATH_INFO $fastcgi_script_name;
        fastcgi_read_timeout 120;
        fastcgi_intercept_errors on;
        add_header Cache-Control "no-store" always;
    }
}
